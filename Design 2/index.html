<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-wrapper">

      <!-- ===== NAVBAR ===== -->
      <nav class="navbar">
        <div class="nav-logo">
          <span class="logo-sq">SQUID</span>
          <span class="logo-game">GAME<span class="logo-plus">+</span></span>
        </div>

        <ul class="nav-links">
          <li><a href="#">About</a></li>
          <li class="active"><a href="#">Watch now</a></li>
          <li><a href="#">Actors</a></li>
          <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-menu">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>

      <!-- ===== HERO ===== -->
      <section class="hero">

        <!-- Scroll indicator -->
        <div class="scroll-indicator">
          <span class="scroll-text">SCROLL</span>
          <div class="scroll-line"></div>
        </div>

        <!-- Social icons (right edge) -->
        <div class="social-icons">
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-facebook-f"></i></a>
        </div>

        <!-- Watermark text -->
        <div class="watermark-side">SQUID</div>
        <div class="watermark-bottom">GAME</div>

        <!-- Hero Left Content -->
        <div class="hero-content">
          <!-- Big Logo Title -->
          <div class="hero-logo">
            <div class="hero-logo-line1">
              <span class="hl-sq">SQ</span><span class="hl-u">U</span><span class="hl-id">ID</span>
              <span class="hl-diamond cyan-diamond">✦</span>
            </div>
            <div class="hero-logo-line2">
              <span class="hl-dot yellow-dot">✦</span>
              <span class="hl-game">GAM</span><span class="hl-e">E</span><span class="hl-dash">+</span>
            </div>
          </div>

          <!-- Meta info -->
          <p class="hero-meta">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br />
            Season 1: 9 Episodes
          </p>

          <!-- CTA Buttons -->
          <div class="hero-btns">
            <button class="btn-play">
              <span class="play-circle"><i class="fas fa-play"></i></span>
              Play Now
            </button>
            <button class="btn-trailer">
              <i class="fas fa-play"></i>
              Watch Trailer
            </button>
          </div>
        </div>

        <!-- Hero Right - Character Image -->
        <div class="hero-image">
          <img
            src="https://i.imgur.com/WpDwXXB.png"
            alt="Squid Game Character"
            class="character-img"
            onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/en/thumb/5/5e/Squid_Game_character_Front_Man.png/220px-Squid_Game_character_Front_Man.png'"
          />
          <!-- Glow effect behind character -->
          <div class="char-glow"></div>
        </div>

      </section>

      <!-- ===== VIDEO CARDS SECTION ===== -->
      <section class="video-cards">

        <!-- Card 1 -->
        <div class="vcard">
          <div class="vcard-img-wrap">
            <img
              src="https://images.unsplash.com/photo-1635805737707-575885ab0820?w=400&q=80"
              alt="Squid Game scene 1"
              onerror="this.src='https://via.placeholder.com/320x180/6b0f3a/ff2d78?text=SQUID+GAME'"
            />
            <div class="vcard-overlay"></div>
            <div class="vcard-label">
              <span class="series-tag">SERIES</span>
              <span class="vcard-title-text">SQUID GAME+</span>
            </div>
            <button class="play-btn-card"><i class="fas fa-play"></i></button>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="vcard">
          <div class="vcard-img-wrap">
            <img
              src="https://images.unsplash.com/photo-1618944913955-e7a7d8efac6d?w=400&q=80"
              alt="Squid Game scene 2"
              onerror="this.src='https://via.placeholder.com/320x180/0a0a2a/00e5ff?text=EPISODE+2'"
            />
            <div class="vcard-overlay"></div>
            <button class="play-btn-card"><i class="fas fa-play"></i></button>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="vcard">
          <div class="vcard-img-wrap">
            <img
              src="https://images.unsplash.com/photo-1596727362302-b8d891c42ab8?w=400&q=80"
              alt="Squid Game scene 3"
              onerror="this.src='https://via.placeholder.com/320x180/0d1f1a/00ffaa?text=EPISODE+3'"
            />
            <div class="vcard-overlay"></div>
            <button class="play-btn-card"><i class="fas fa-play"></i></button>
          </div>
        </div>

      </section>

    </div>
  </body>
</html>
